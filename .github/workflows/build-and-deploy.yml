name: Build & Deploy to Cloudflare Pages

on:
  # Run daily at 06:00 UTC (14:00 Hong Kong time)
  schedule:
    - cron: '0 6 * * *'
  # Also run on push to main/master
  push:
    branches: [main, master]
  # Allow manual trigger
  workflow_dispatch:

# Allow write access for Cloudflare Pages deployment
permissions:
  contents: read

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch book data from Amazon Creators API
        env:
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_MARKETPLACE: 'www.amazon.com'
          AMAZON_TOKEN_ENDPOINT: 'https://api.amazon.com/auth/o2/token'
        run: python scripts/fetch_books.py

      - name: Generate static site
        run: python scripts/generate_site.py

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
        run: |
          # Step 1: Create project if not exists (ignore error if already exists)
          npx --yes wrangler@3 pages project create audible-credit-optimizer --production-branch master 2>/dev/null || true
          # Step 2: Deploy
          npx --yes wrangler@3 pages deploy output --project-name=audible-credit-optimizer --branch=master
