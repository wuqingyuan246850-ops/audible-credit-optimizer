name: Build & Deploy to Cloudflare Pages
on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: 'cloudflare-pages'
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Fetch book data
        env:
          AMAZON_ACCESS_KEY: ${{ secrets.AMAZON_ACCESS_KEY }}
          AMAZON_SECRET_KEY: ${{ secrets.AMAZON_SECRET_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          AMAZON_MARKETPLACE: 'www.amazon.com'
        run: python scripts/fetch_books.py
      - name: Generate static site
        run: python scripts/generate_site.py
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages project create audible-credit-optimizer --production-branch master 2>/dev/null || true
          npx --yes wrangler@3 pages deploy output --project-name=audible-credit-optimizer --branch=master
